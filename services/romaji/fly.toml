# fly.toml app configuration file generated for song-kara-romaji on 2026-06-19T07:30:55+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

# Set API_KEY before first deploy: fly secrets set API_KEY=<value>
# Worker must use the same value via ROMAJI_SERVICE_API_KEY.
app = 'song-kara-romaji'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
