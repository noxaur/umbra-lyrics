name: Deploy Romaji Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - services/romaji/**
      - .github/workflows/deploy-romaji.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/romaji
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: Deploy cutlet service to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
