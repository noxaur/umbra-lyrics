name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx tsc -b

      - run: npx vp build

      - name: Prepare wrangler config for production deploy
        run: node scripts/prepare-wrangler-deploy.mjs dist/song_kara/wrangler.json

      - name: Deploy Worker to song.opsec.rent
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/deploy-wrangler.mjs dist/song_kara/wrangler.json
